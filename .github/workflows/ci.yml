name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Interop" --collect:"XPlat Code Coverage" --results-directory ./TestResults

    - name: Upload coverage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-${{ matrix.os }}
        path: ./TestResults/**/coverage.cobertura.xml
        if-no-files-found: warn

  interop:
    # Cross-implementation conformance: drive the Andy.MCP client against the official
    # reference server (@modelcontextprotocol/server-everything) over stdio.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Pre-fetch reference MCP server
      run: timeout 120 npx -y @modelcontextprotocol/server-everything stdio </dev/null || true

    - name: Build
      run: dotnet build --configuration Release

    - name: Interop tests
      run: dotnet test --configuration Release --no-build --framework net8.0 --filter "Category=Interop"

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Fail on vulnerable dependencies
      shell: bash
      run: |
        output=$(dotnet list package --vulnerable --include-transitive 2>&1)
        echo "$output"
        if echo "$output" | grep -q "has the following vulnerable packages"; then
          echo "::error::Vulnerable dependencies detected"
          exit 1
        fi

    - name: Report outdated packages
      shell: bash
      run: dotnet list package --outdated || true
